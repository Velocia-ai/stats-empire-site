# Netlify continuous deployment config for the Stats Empire static export.
# The repo root IS the Next.js app, which builds to ./out via `output: 'export'`.
[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# ---------------------------------------------------------------------------
# Response headers
# Netlify applies header blocks top-to-bottom; later, more specific rules win
# for a given asset. Security headers are set on every response, caching is
# tuned per asset class below.
# ---------------------------------------------------------------------------

# Baseline: applies to every path (notably HTML pages).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    # Static Next export: no nonce is available, and Next's hydration relies on
    # inline bootstrap scripts (self.__next_f.push) while framer-motion writes
    # inline style attributes. 'unsafe-inline' on script-src/style-src is
    # therefore required so hydration and animations are not blocked. All other
    # directives are kept tight: only same-origin, data: images, and self fonts.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests"
    # HTML must revalidate so a new deploy is visible immediately.
    Cache-Control = "public, max-age=0, must-revalidate"

# Content-hashed, immutable build assets. Safe to cache for a year.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Hashed static media (fonts/images) also live under _next/static, but cover
# any top-level hashed asset types explicitly in case they are emitted there.
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
